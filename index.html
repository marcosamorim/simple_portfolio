<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>mamorim.dev</title>
  <meta name="description" content="Portfolio / links" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <header class="card header">
      <img class="avatar" src="assets/profile.jpg" alt="Profile photo" />
      <div class="head-text">
        <h1 id="name">Name</h1>
        <p class="muted tagline" id="tagline">Tagline</p>
        <p class="hero-location" id="location"></p>
        <p class="hero-meta hero-meta--current" id="current"></p>
      </div>
    </header>

    <section class="card">
      <h2>About</h2>
      <div id="about"></div>
    </section>

    <section class="card">
      <h2>Links</h2>
      <div class="buttons" id="links"></div>
    </section>

    <section class="card">
      <h2>Skills</h2>
      <div class="chips" id="skills"></div>
    </section>

    <section class="card">
      <h2>Projects</h2>
      <div class="projects" id="projects"></div>
    </section>

    <footer class="muted small footer">
      <span id="year">2025</span> • mamorim.dev
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
